services:
  - type: web
    name: pyfinancas
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false

  - type: cron
    name: pyfinancas-notificacoes
    env: python
    region: ohio
    plan: free
    schedule: "0 12 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python notificacao_email.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
